name: PR Gate - Branch Protection Demo

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  code-audit-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 代码审计（高危阻断 PR）
        uses: ./
        with:
          fail-on-findings: 'true'
          enable-telegram: 'true'
          telegram-bot-token: ${{ secrets.TG_BOT_TOKEN }}
          telegram-chat-id: ${{ secrets.TG_CHAT_ID }}
          telegram-bot-username: '@test_skills_yh_bot'

      - name: PR 评论（审计失败时）
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚨 **代码审计未通过**，请修复问题后重新提交。\n\n查看 [Actions 运行日志](' + context.payload.repository.html_url + '/actions/runs/' + context.runId + ') 获取详情。'
            });
