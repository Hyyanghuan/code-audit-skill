name: Enterprise CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: pip install -q pyyaml pytest
      - name: 企业级单元测试
        run: pytest tests/ -q

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell 语法检查（关键脚本）
        run: |
          bash -n scripts/init.sh
          bash -n scripts/finalize-results.sh
          bash -n scripts/load-telegram-config.sh
          bash -n scripts/send-telegram.sh
