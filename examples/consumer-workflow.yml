# 业务仓库最小接入示例
# 复制到 .github/workflows/code-audit.yml

name: Code Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      working-directory:
        description: '审计目录'
        required: false
        default: '.'

permissions:
  contents: read
  pull-requests: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 运行代码审计 Skill
        uses: YOUR_USERNAME/code-audit-skill@main   # 引用主干最新版
        with:
          working-directory: ${{ github.event.inputs.working-directory || '.' }}
          fail-on-findings: 'true'
          enable-telegram: 'true'
          # TG 配置写死在 Skill 仓库 config/telegram.yaml，无需 Secrets
