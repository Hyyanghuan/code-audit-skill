# 业务仓库最小接入示例
# 复制到 .github/workflows/code-audit.yml 并按注释配置 secrets

name: Code Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      working-directory:
        description: '审计目录'
        required: false
        default: '.'

permissions:
  contents: read
  pull-requests: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 运行代码审计 Skill
        uses: YOUR_ORG/code-audit-skill@v1   # 替换为实际仓库路径
        with:
          working-directory: ${{ github.event.inputs.working-directory || '.' }}
          fail-on-findings: 'true'
          # 模块开关（可按需关闭）
          enable-gitleaks: 'true'
          enable-super-linter: 'true'
          enable-bandit: 'true'
          enable-dependency-scan: 'true'
          enable-custom-rules: 'true'
          # Telegram 通知
          enable-telegram: 'true'
          telegram-bot-token: ${{ secrets.TG_BOT_TOKEN }}
          telegram-chat-id: ${{ secrets.TG_CHAT_ID }}
          telegram-bot-username: '@your_bot'
